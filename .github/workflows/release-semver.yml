name: Release SemVer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  id-token: write

concurrency:
  group: release-semver-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Resolve release labels from the merged PR
        id: labels
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls"
          response="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}" || printf '[]')"

          pr_number="$(printf '%s' "${response}" | jq -r '.[0].number // empty')"
          if [ -n "${pr_number}" ]; then
            printf '%s' "${response}" | jq -r '.[0].labels[]?.name // empty' > /tmp/release-labels.txt
            label_summary="$(tr '\n' ',' < /tmp/release-labels.txt | sed 's/,$//')"
            echo "pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
            echo "labels=${label_summary}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          : > /tmp/release-labels.txt
          {
            echo "pr_number="
            echo "labels="
          } >> "${GITHUB_OUTPUT}"

      - name: Decide whether this push should release
        id: gate
        run: |
          set -euo pipefail

          if [ -z "${{ steps.labels.outputs.pr_number }}" ]; then
            echo "Direct push to main detected. Release automation will skip." >&2
            echo "skip_release=true" >> "${GITHUB_OUTPUT}"
            echo "reason=no-merged-pr" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          release_labels="$(grep -E '^release:(major|minor|patch|none)$' /tmp/release-labels.txt || true)"
          release_label_count="$(printf '%s\n' "${release_labels}" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "${release_label_count}" = "0" ]; then
            echo "Merged PR has no release label. Release automation will skip." >&2
            echo "skip_release=true" >> "${GITHUB_OUTPUT}"
            echo "reason=missing-release-label" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${release_label_count}" -gt 1 ]; then
            echo "Merged PR has multiple release labels." >&2
            exit 1
          fi

          echo "skip_release=false" >> "${GITHUB_OUTPUT}"
          echo "reason=labeled-pr" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js
        if: steps.gate.outputs.skip_release != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm dependencies
        if: steps.gate.outputs.skip_release != 'true'
        run: npm ci

      - name: Compute semantic version
        id: semver
        if: steps.gate.outputs.skip_release != 'true'
        run: |
          set -euo pipefail

          existing_version="$(git tag --points-at "${GITHUB_SHA}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          if [ -n "${existing_version}" ]; then
            {
              echo "version=${existing_version}"
              echo "tag_exists=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_version="$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          initial_release="0"
          if [ -n "${latest_version}" ]; then
            base_version="${latest_version}"
          else
            base_version="$(node -p 'require("./packages/codex-subagent-kit/package.json").version')"
            initial_release="1"
          fi

          version="$(
            BASE_VERSION="${base_version}" \
            LABELS_FILE="/tmp/release-labels.txt" \
            INITIAL_RELEASE="${initial_release}" \
            npm run release:version --workspace codex-subagent-kit --silent
          )"

          if [ "${version}" = "skip" ]; then
            {
              echo "version="
              echo "tag_exists=false"
              echo "skip_release=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "version=${version}"
            echo "tag_exists=false"
            echo "skip_release=false"
          } >> "${GITHUB_OUTPUT}"

      - name: Sync workspace version into main
        id: sync
        if: steps.gate.outputs.skip_release != 'true' && steps.semver.outputs.tag_exists == 'false' && steps.semver.outputs.skip_release != 'true'
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail

          npm version --workspace codex-subagent-kit --no-git-tag-version "${RELEASE_VERSION}"

          if git diff --quiet -- packages/codex-subagent-kit/package.json package-lock.json; then
            {
              echo "sha=${GITHUB_SHA}"
              echo "committed=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/codex-subagent-kit/package.json package-lock.json
          git commit -m "chore: sync package version to ${RELEASE_VERSION} [skip release]"
          git push origin HEAD:main

          {
            echo "sha=$(git rev-parse HEAD)"
            echo "committed=true"
          } >> "${GITHUB_OUTPUT}"

      - name: Create git tag
        if: steps.gate.outputs.skip_release != 'true' && steps.semver.outputs.tag_exists == 'false' && steps.semver.outputs.skip_release != 'true'
        run: |
          git tag "${{ steps.semver.outputs.version }}" "${{ steps.sync.outputs.sha || github.sha }}"
          git push origin "${{ steps.semver.outputs.version }}"

      - name: Create GitHub Release
        if: steps.gate.outputs.skip_release != 'true' && steps.semver.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: ${{ steps.semver.outputs.version }}
          generate_release_notes: true
          target_commitish: ${{ steps.sync.outputs.sha || github.sha }}

      - name: Sync package version to release version for publish
        if: steps.gate.outputs.skip_release != 'true' && steps.semver.outputs.skip_release != 'true'
        run: npm version --workspace codex-subagent-kit --no-git-tag-version "${{ steps.semver.outputs.version }}"

      - name: Run TypeScript repository gate
        if: steps.gate.outputs.skip_release != 'true' && steps.semver.outputs.skip_release != 'true'
        run: ./scripts/test.sh

      - name: Publish to npm
        if: steps.gate.outputs.skip_release != 'true' && steps.semver.outputs.skip_release != 'true'
        run: npm publish --workspace codex-subagent-kit --access public --provenance
