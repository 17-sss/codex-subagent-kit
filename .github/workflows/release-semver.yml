name: Release SemVer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-semver-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Compute semantic version
        id: semver
        run: |
          set -euo pipefail

          existing_version="$(git tag --points-at "${GITHUB_SHA}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          if [ -n "${existing_version}" ]; then
            {
              echo "version=${existing_version}"
              echo "tag_exists=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          latest_version="$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          if [ -n "${latest_version}" ]; then
            commit_range="${latest_version}..${GITHUB_SHA}"
            base_version="${latest_version}"
          else
            base_version="$(node -p 'require("./packages/codex-subagent-kit/package.json").version')"
            {
              echo "version=${base_version}"
              echo "tag_exists=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git log --format='%B%n---commit-boundary---' "${commit_range}" > /tmp/release-commit-messages.txt

          version="$(
            BASE_VERSION="${base_version}" \
            COMMITS_FILE="/tmp/release-commit-messages.txt" \
            npm run release:version --workspace codex-subagent-kit --silent
          )"

          {
            echo "version=${version}"
            echo "tag_exists=false"
          } >> "${GITHUB_OUTPUT}"

      - name: Sync workspace version into main
        id: sync
        if: steps.semver.outputs.tag_exists == 'false'
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail

          npm version --workspace codex-subagent-kit --no-git-tag-version "${RELEASE_VERSION}"

          if git diff --quiet -- packages/codex-subagent-kit/package.json package-lock.json; then
            {
              echo "sha=${GITHUB_SHA}"
              echo "committed=false"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/codex-subagent-kit/package.json package-lock.json
          git commit -m "chore: sync package version to ${RELEASE_VERSION} [skip release]"
          git push origin HEAD:main

          {
            echo "sha=$(git rev-parse HEAD)"
            echo "committed=true"
          } >> "${GITHUB_OUTPUT}"

      - name: Create git tag
        if: steps.semver.outputs.tag_exists == 'false'
        run: |
          git tag "${{ steps.semver.outputs.version }}" "${{ steps.sync.outputs.sha || github.sha }}"
          git push origin "${{ steps.semver.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.version }}
          name: ${{ steps.semver.outputs.version }}
          generate_release_notes: true
          target_commitish: ${{ steps.sync.outputs.sha || github.sha }}
