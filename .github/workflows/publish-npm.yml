name: Publish npm Package

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Semver tag to publish, for example 0.2.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release version
        id: release
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          if ! [[ "${RELEASE_TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unsupported release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi

          echo "version=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Check whether the release version is already on npm
        id: registry
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          package_name="$(node -p 'require("./packages/codex-subagent-kit/package.json").name')"

          set +e
          npm view "${package_name}@${RELEASE_VERSION}" version >/tmp/npm-view.stdout 2>/tmp/npm-view.stderr
          status=$?
          set -e

          if [ "${status}" = "0" ]; then
            published_version="$(tr -d '\n' < /tmp/npm-view.stdout)"
            echo "version ${published_version} is already published for ${package_name}; skipping publish"
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if grep -q "E404" /tmp/npm-view.stderr; then
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          cat /tmp/npm-view.stderr >&2
          exit "${status}"

      - name: Upgrade npm for trusted publishing
        if: steps.registry.outputs.already_published != 'true'
        run: npm install -g npm@11.12.1

      - name: Install npm dependencies
        if: steps.registry.outputs.already_published != 'true'
        run: npm ci

      - name: Sync package version to release tag
        if: steps.registry.outputs.already_published != 'true'
        run: |
          set -euo pipefail

          current_version="$(node -p 'require("./packages/codex-subagent-kit/package.json").version')"
          if [ "${current_version}" = "${{ steps.release.outputs.version }}" ]; then
            echo "package version already matches ${current_version}; skipping npm version"
            exit 0
          fi

          npm version --workspace codex-subagent-kit --no-git-tag-version "${{ steps.release.outputs.version }}"

      - name: Run TypeScript repository gate
        if: steps.registry.outputs.already_published != 'true'
        run: ./scripts/test.sh

      - name: Publish to npm
        if: steps.registry.outputs.already_published != 'true'
        run: npm publish --workspace codex-subagent-kit --access public --provenance

      - name: Skip duplicate publish
        if: steps.registry.outputs.already_published == 'true'
        run: echo "npm already has version ${{ steps.release.outputs.version }}; nothing to publish"
