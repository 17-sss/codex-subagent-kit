name: Backfill GitHub Release (Manual)

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Existing semver to backfill into git tag and GitHub Release, for example 0.2.1
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: backfill-release-${{ github.event.inputs.release_version || github.ref }}
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve requested version
        id: release
        env:
          RELEASE_VERSION: ${{ github.event.inputs.release_version }}
        run: |
          set -euo pipefail

          if ! [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unsupported release version: ${RELEASE_VERSION}" >&2
            exit 1
          fi

          echo "version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve target commit
        id: target
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Verify repository version matches the requested release
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          current_version="$(node -p 'require("./packages/codex-subagent-kit/package.json").version')"
          if [ "${current_version}" != "${RELEASE_VERSION}" ]; then
            echo "package version is ${current_version}, not ${RELEASE_VERSION}" >&2
            echo "Sync the workspace version into main first, then rerun this workflow." >&2
            exit 1
          fi

      - name: Create git tag when missing
        id: tag
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          if git show-ref --verify --quiet "refs/tags/${RELEASE_VERSION}"; then
            echo "created=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git tag "${RELEASE_VERSION}" "${{ steps.target.outputs.sha }}"
          git push origin "${RELEASE_VERSION}"
          echo "created=true" >> "${GITHUB_OUTPUT}"

      - name: Check whether the GitHub Release already exists
        id: existing_release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          status="$(
            curl -s -o /tmp/github-release.json -w '%{http_code}' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_VERSION}"
          )"

          if [ "${status}" = "200" ]; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${status}" = "404" ]; then
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          cat /tmp/github-release.json >&2
          exit 1

      - name: Create GitHub Release when missing
        if: steps.existing_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: ${{ steps.release.outputs.version }}
          generate_release_notes: true
          target_commitish: ${{ steps.target.outputs.sha }}

      - name: Skip existing GitHub Release
        if: steps.existing_release.outputs.exists == 'true'
        run: echo "GitHub Release for ${{ steps.release.outputs.version }} already exists; nothing to backfill"
